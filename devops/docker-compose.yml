services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engapp-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-engapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engapp}
      POSTGRES_DB: ${POSTGRES_DB:-engapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engapp -d engapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
